services:
  # Backend API
  - type: web
    name: zuno-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    preDeployCommand: cd backend && node scripts/fix-media-urls.js || true
    startCommand: cd backend && node --max-old-space-size=400 --expose-gc server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      # ⚠️ DO NOT add Cloudinary secrets here. Set them in Render dashboard → Environment.
      # Required: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Cloudinary Live Streaming
      - key: CLOUDINARY_STREAM_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_STREAM_KEY
        sync: false
      - key: CLOUDINARY_STREAM_RTMP_URL
        sync: false
      - key: CLOUDINARY_STREAM_HLS_URL
        sync: false
      - key: CLOUDINARY_STREAM_HLS_PUBLIC_ID
        sync: false
      - key: CLOUDINARY_STREAM_PLAYER_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      # Email service
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        value: https://zunoworld.tech

  # Frontend Static Site
  - type: web
    name: zuno-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: VITE_API_URL
        value: https://zuno-backend-bevi.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
